name: Build and Release

on:
  push:
    tags:
      - 'v*' # Se déclenche uniquement quand tu push un tag qui commence par 'v' (ex: v1.0.0)

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest] # Lance un serveur Windows et un serveur Ubuntu en même temps

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-env: 'production'
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish Electron App
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            npm run release:win -- --publish always
          else
            npm run release:lin -- --publish always
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Donne l'autorisation à Electron d'écrire la release GitHub
        shell: bash
